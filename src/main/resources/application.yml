spring:
  application:
    name: arbitrage-bot

  web:
    cors:
      allowed-origins: "http://localhost:3000,http://localhost:8081"
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allowed-headers: "*"
      allow-credentials: true

server:
  port: 8080
  servlet:
    context-path: /
  error:
    include-message: always
    include-stacktrace: on_param

logging:
  level:
    root: INFO
    com.mySelfCode.algo: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

bot:
  password: Maxbur010!
  kucoin-fee: 0.002
  bybit-fee: 0.00135
  reverse-spread: 0.2
  update-interval-ms: 1000
  real-trading-enabled: true
  simulation-mode: false

reactor:
  netty:
    http:
      client:
        quic:
          enabled: false

kucoin:
  api:
    key: "6987661a12bd0a0001141b7e"
    secret: "f6ee8ff4-d59d-4777-aef4-b360ded6bfa2"
    passphrase: "Maxbur010!"
    base-url: https://api.kucoin.com
    ws-enabled: false
    connect-timeout: 10000
    read-timeout: 30000
    requests-per-second: 10

