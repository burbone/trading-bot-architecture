spring:
  application:
    name: arbitrage-bot

  web:
    cors:
      allowed-origins: "http://localhost:3000,http://localhost:8081"
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allowed-headers: "*"
      allow-credentials: true

server:
  port: 8080
  servlet:
    context-path: /
  error:
    include-message: always
    include-stacktrace: on_param

logging:
  level:
    root: INFO
    com.arbitrage.crypto_arbitrage: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# ===== BOT CONFIGURATION =====
bot:
  # Комиссии бирж (в процентах)
  # Проверьте актуальные комиссии на биржах!
  kucoin-fee: 0.001
  bybit-fee: 0.001

  # Интервал проверки цен (мс)
  update-interval-ms: 1000

  # РЕЖИМ РАБОТЫ
  # false = симуляция (безопасно, без реальных денег)
  # true = реальная торговля (ВНИМАНИЕ: реальные деньги!)
  real-trading-enabled: true

  # Симуляция спреда (только для режима симуляции)
  simulated-spread: 0.001

reactor:
  netty:
    http:
      client:
        quic:
          enabled: false

