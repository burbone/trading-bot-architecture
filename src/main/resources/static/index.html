<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинг бирж</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container" id="appContainer">
    <div class="header">
        <div class="password-row">
            <input type="password" class="top-input" id="password" placeholder="Пароль">
        </div>

        <div class="pairs-section" id="pairsSection">
            <div class="pair-row" id="pairRow0">
                <input type="text" class="symbol-input top-input" placeholder="Символ BTC USDT">
                <input type="text" class="percent-input top-input" placeholder="0,00">
            </div>
        </div>

        <div class="header-actions">
            <button type="button" class="btn-add" id="addPairBtn">+</button>
            <button type="button" class="top-status top-input status-stopped" id="statusDisplay">
                Остановлено
            </button>
        </div>

        <div class="form-errors" id="formErrors"></div>
    </div>

    <div class="content" id="mainContent">
        <div class="history-section">
            <div class="history-header"><span>История</span></div>
            <div class="history-list" id="historyList"></div>
        </div>
    </div>
</div>
<script src="js/main.js"></script>
</body>
</html>
